---
name: CI

"on":
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.28"
          enable-cache: true

      - name: Install Python
        run: uv python install

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: 1.12.4

      - name: Install project dependencies
        run: uv sync --locked

      - name: Prepare generated files
        run: cp ansible/inventory/hosts.example.yml ansible/inventory/hosts.yml

      - name: Initialize OpenTofu
        run: tofu -chdir=tofu init -backend=false -input=false

      - name: Validate OpenTofu
        run: |
          tofu -chdir=tofu fmt -check -diff
          tofu -chdir=tofu validate

      - name: Lint YAML and Ansible
        run: |
          uv run yamllint .
          cd ansible
          uv run ansible-lint
          uv run ansible-playbook playbook.yml --syntax-check

      - name: Lint shell scripts
        run: shellcheck scripts/*.sh
