---
# Install exact npm CLI versions from the repository manifest.

- name: Load npm CLI versions
  ansible.builtin.include_vars:
    file: "{{ playbook_dir }}/../package.json"
    name: agent_clis_package_manifest

- name: Map npm packages to installed binaries
  ansible.builtin.set_fact:
    agent_clis_npm_bins:
      t3: "{{ t3code_bin }}"
      "@openai/codex": codex
      "@anthropic-ai/claude-code": claude
      opencode-ai: opencode

- name: Check installed npm CLI versions
  ansible.builtin.command: "{{ agent_clis_npm_bins[agent_clis_cli.key] }} --version"
  register: agent_clis_installed
  changed_when: false
  failed_when: false
  loop: "{{ agent_clis_package_manifest.dependencies | dict2items }}"
  loop_control:
    loop_var: agent_clis_cli
    label: "{{ agent_clis_cli.key }}"

- name: Install pinned npm CLIs
  ansible.builtin.command: >
    npm install -g --prefix /usr/local {{ agent_clis_result.agent_clis_cli.key }}@{{ agent_clis_result.agent_clis_cli.value }}

  environment:
    PATH: "/usr/local/bin:/usr/bin:/bin"
  changed_when: true
  when: >-
    agent_clis_result.rc != 0 or agent_clis_result.agent_clis_cli.value not in agent_clis_result.stdout
  loop: "{{ agent_clis_installed.results }}"
  loop_control:
    loop_var: agent_clis_result
    label: >-
      {{ agent_clis_result.agent_clis_cli.key }}@{{ agent_clis_result.agent_clis_cli.value }}

- name: Send Claude hello every four hours
  ansible.builtin.cron:
    name: Send Claude hello every four hours
    user: "{{ agent_user }}"
    minute: "0"
    hour: "*/4"
    job: >-
      /usr/local/bin/claude auth status >/dev/null 2>&1 && /usr/local/bin/claude --safe-mode --tools '' --print --no-session-persistence hello >/dev/null 2>&1
