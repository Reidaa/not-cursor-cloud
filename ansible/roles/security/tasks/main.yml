---
- name: Install unattended-upgrades
  ansible.builtin.apt:
    name: unattended-upgrades
    state: present

- name: Enable automatic security updates
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
    owner: root
    group: root
    mode: "0644"

- name: Harden sshd
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/90-hardening.conf
    content: |
      PasswordAuthentication no
      KbdInteractiveAuthentication no
      PermitRootLogin no
      X11Forwarding no
      # Conventional OpenSSH remains admin-only. The keyless agent account may
      # accept separately authorized Tailscale SSH sessions for remote tools.
      AllowUsers {{ admin_user }}
    owner: root
    group: root
    mode: "0644"
    validate: sshd -t -f %s
  notify: Restart sshd

- name: Ensure sshd is enabled
  ansible.builtin.systemd_service:
    name: ssh
    enabled: true
    state: started
